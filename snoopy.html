<!DOCTYPE html>
<!-- HTML document declaration for the sign-in/sign-up page -->
<html lang="en">
<!-- Head section: Contains metadata, title, and links to stylesheets -->
<head>
  <meta charset="UTF-8" />
  <!-- Page title displayed in browser tab -->
  <title>Sign In — Alt Market</title>
  <!-- Link to main stylesheet for the site -->
  <link rel="stylesheet" type="text/css" href="clifford.css" />
  <!-- Google Fonts link for Material Symbols icons used in the UI -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=account_circle" />
</head>
<!-- Body section: Contains the visible content of the page -->
<body>
  <!-- Navigation bar with link back to home page -->
  <nav>
  <ul>
    <li><a href="garfield.html">Home</a></li>
  </ul>
</nav>

  <!-- Main content area for authentication forms -->
  <main class="auth-page">
    <!-- Card container for the auth forms -->
    <div class="auth-card">
      <!-- Dynamic title that changes based on active tab -->
      <h1 id="form-title">Sign In</h1>

      <!-- Tab buttons to switch between sign-in and sign-up forms -->
      <div class="auth-tabs">
        <button id="tab-signin" class="tab-btn active">Sign In</button>
        <button id="tab-signup" class="tab-btn">Sign Up</button>
      </div>

      <!-- Sign-in form (visible by default) -->
      <form id="signin-form" class="auth-form">
        <!-- Email input field -->
        <input class="auth-input" type="email" placeholder="Email" />
        <!-- Password input field -->
        <input class="auth-input" type="password" placeholder="Password" />
        <!-- Action buttons area -->
        <div class="auth-actions">
          <button class="auth-btn" type="button">Sign in</button>
        </div>

        <!-- Social sign-in options -->
        <div class="socials">
          <button class="social-btn" type="button">Sign in with Google</button>
          <button class="social-btn" type="button">Sign in with Facebook</button>
          <button class="social-btn" type="button">Sign in with Apple</button>
        </div>

        <!-- Footer with "stay signed in" checkbox -->
        <div class="auth-footer">
          <label class="small"><input type="checkbox" /> Stay signed in</label>
        </div>
      </form>

      <!-- Sign-up form (hidden by default) -->
      <form id="signup-form" class="auth-form hidden">
        <!-- Email input field -->
        <input class="auth-input" type="email" placeholder="Email" />
        <!-- Password input field -->
        <input class="auth-input" type="password" placeholder="Password" />
        <!-- Action buttons area -->
        <div class="auth-actions">
          <button class="auth-btn" type="button">Create account</button>
        </div>

        <!-- Social sign-up options -->
        <div class="socials">
          <button class="social-btn" type="button">Create with Google</button>
          <button class="social-btn" type="button">Create with Facebook</button>
          <button class="social-btn" type="button">Create with Apple</button>
        </div>

        <!-- Footer with "stay signed in" checkbox -->
        <div class="auth-footer">
          <label class="small"><input type="checkbox" /> Stay signed in</label>
        </div>
      </form>
    </div>
  </main>

  <!-- JavaScript file for handling tab switching functionality -->
  <script src="pluto.js"></script>
</body>
</html>
<!--  web login page -->
