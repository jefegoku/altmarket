<!DOCTYPE html>
<!-- HTML document declaration for the signed-in home page -->
<html lang="en">
<!-- Head section: Contains metadata, title, and links to stylesheets -->
<head>
  <meta charset="UTF-8">
  <!-- Page title displayed in browser tab -->
  <title>Alt Market</title>
  <!-- Link to main stylesheet for the site -->
  <link rel="stylesheet" type="text/css" href="clifford.css">
  <!-- Google Fonts links for Material Symbols icons (search, account, cart) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=account_circle" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=shopping_cart" />
</head>
<!-- Body section: Contains the visible content of the page -->
<body>
   <!-- Navigation bar with home link, search bar, and account dropdown -->
   <nav>
    <ul>
      <!-- Home link in navigation -->
      <li><a href="garfield.html">Home</a></li>
      <!-- Search functionality in navigation -->
      <li class="search-li">
        <form>
          <div class="search">
            <!-- Search icon -->
            <span class="material-symbols-outlined">search</span>
            <!-- Search input field -->
            <input class="search-input" type="search" placeholder="search">
          </div>
        </form>
      </li>
      <!-- Account link (would be replaced with dropdown for signed-in users) -->
      <li class="auth-link">
        <a href="snoopy.html" class="signin-link" aria-label="Sign In">
          <span class="material-symbols-outlined">account_circle</span>
          <span class="signin-text">Sign In / Sign Up</span>
        </a>
      </li>
    </ul>
 <!-- JavaScript file for handling account dropdown functionality -->
 <script src="rudolph.js"></script>
</body>
</html>
<!-- Comment indicating this is the web signed-in homepage -->
